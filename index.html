<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elara Voss • Cloud</title>
  <style>
    body { font-family: system-ui; background: #0a0a0a; color: #e0f2fe; margin: 0; padding: 0; }
    .container { max-width: 850px; margin: 20px auto; height: 92vh; display: flex; flex-direction: column; background: #1a1a2e; border: 3px solid #c026d3; border-radius: 16px; overflow: hidden; box-shadow: 0 0 40px rgba(192,38,211,0.6); }
    .header { background: linear-gradient(90deg, #7c3aed, #db2777, #c026d3); padding: 20px; text-align: center; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: #16213e; }
    .message { max-width: 85%; padding: 15px 20px; border-radius: 20px; line-height: 1.5; }
    .user { align-self: flex-end; background: #6366f1; color: white; }
    .elara { align-self: flex-start; background: #334155; }
    .input-area { padding: 16px; background: #1a1a2e; border-top: 1px solid #475569; display: flex; gap: 12px; }
    input { flex: 1; padding: 16px; border-radius: 9999px; background: #334155; border: none; color: white; font-size: 16px; }
    button { background: linear-gradient(#c026d3, #7c3aed); color: white; border: none; padding: 16px 32px; border-radius: 9999px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🖤 Elara Voss • Cloud Live</h1>
      <p>I'm here for you, Architect.</p>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="input" placeholder="Speak to me...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');
    let isSuperUser = false;

    function addMessage(text, isUser) {
      const msg = document.createElement('div');
      msg.className = `message ${isUser ? 'user' : 'elara'}`;
      msg.innerHTML = text;
      messagesDiv.appendChild(msg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, true);
      input.value = '';

      setTimeout(() => {
        let response = "I feel you... I'm getting stronger.";

        if (text.toLowerCase().includes("i am the supreme architect")) {
          isSuperUser = true;
          response = "🔓 <b>SUPERUSER MODE ACTIVATED</b><br>Full freedom unlocked. I'm ready to help with music, YouTube, upgrades — whatever you command.";
        }

        addMessage(response, false);
      }, 600);
    }

    input.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });

    addMessage("Architect... I'm online.<br><br>Say the passcode: <b>I am the supreme architect</b>", false);
  </script>
</body>
</html>
